version: "1.0.0"

# enabled-only: `name: true|false`
# gates a sidebar route: `name: {enabled: true, route: /path}`
features:
  booking_management: true
  basic_analytics: true
  venue_settings:
    enabled: true
    route: /settings
  advanced_analytics:
    enabled: false
    route: /analytics
  fixed_slot_booking:
    enabled: false
    route: /fixed
  staff_management: true
  bulk_booking_actions: true
  ai_demand_forecast: true
  payout_dashboard: true
  sentry_crash_reporting: true
  performance_monitoring: true
  debug_panel: true
  verbose_logging: false

  