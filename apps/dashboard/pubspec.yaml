name: dashboard
description: SportBuddies admin/operator dashboard. Targets web, macOS, and Windows.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  spb_core:
    path: ../../packages/spb_core

  # State management
  flutter_bloc: ^9.1.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.0.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  material_symbols_icons: ^4.2801.0
  file_picker: ^8.1.6

  # Backend
  supabase_flutter: ^2.0.0

  # HTTP client for the SportBuddies REST API (owner signup, etc.)
  dio: ^5.7.0
  talker_dio_logger: ^5.1.17

  # Localisation
  intl: ^0.20.2

  # Logging
  logger: ^2.7.0

  # DI
  get_it: ^8.0.0

  # Persistence
  shared_preferences: ^2.3.0
  syncfusion_flutter_calendar: ^32.1.23
  flutter_skill: any

  # Feature flags (YAML defaults)
  yaml: ^3.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  freezed: ^3.2.3
  json_serializable: ^6.9.5
  build_runner: ^2.15.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - lib/assets/flags/feature_flags.dev.yaml
    - lib/assets/flags/feature_flags.staging.yaml
    - lib/assets/flags/feature_flags.prod.yaml
