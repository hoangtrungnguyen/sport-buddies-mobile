name: customer
description: SportBuddies customer-facing Flutter app. Court booking marketplace for Ho Chi Minh City.
publish_to: 'none'
version: 0.1.0+12

environment:
  sdk: ^3.8.0
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  spb_core:
    path: ../../packages/spb_core

  # State management
  flutter_bloc: ^9.0.0
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Logging
  logger: ^2.7.0

  # Backend / data
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.3
  http: ^1.2.0
  connectivity_plus: ^6.1.0

  # Navigation
  go_router: ^14.0.0

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Location (map-rendering packages removed — discovery is list-only, EPIC-4)
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  url_launcher: ^6.3.2 # open external map apps from the court address

  # i18n
  intl: ^0.20.2
  flutter_skill: ^0.9.36
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_driver:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.9.4
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true
  generate: true
