name: customer
description: SportBuddies customer-facing Flutter app. Court booking marketplace for Ho Chi Minh City.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  spb_core:
    path: ../../packages/spb_core

  # State management
  flutter_bloc: ^8.1.6
  freezed_annotation: ^3.1.0

  # Logging
  logger: ^2.7.0

  # Environment variables
  envied: ^1.3.5

  # Backend / data
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.3

  # Navigation
  go_router: ^14.0.0

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Maps & location
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  vietmap_flutter_plugin: ^0.5.2
  google_maps_flutter: ^2.6.0
  google_maps_flutter_web: ^0.5.4

  # i18n
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.7.1
  freezed: ^3.2.3
  injectable_generator: ^2.6.1
  envied_generator: ^1.3.1

flutter:
  uses-material-design: true
  generate: true
