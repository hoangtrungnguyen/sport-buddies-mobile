name: customer
description: SportBuddies customer-facing Flutter app. Court booking marketplace for Ho Chi Minh City.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  spb_core:
    path: ../../packages/spb_core

  # State management
  flutter_bloc: ^8.1.6

  # Backend / data
  supabase_flutter: ^2.5.0
  shared_preferences: ^2.2.3
  firebase_core: ^3.0.0

  # Navigation
  go_router: ^14.0.0

  # Dependency injection
  get_it: ^7.7.0
  injectable: ^2.4.2

  # Maps & location
  flutter_map: ^7.0.0
  geolocator: ^12.0.0
  vietmap_flutter_plugin: ^0.5.2

  # i18n
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.11
  injectable_generator: ^2.6.1

flutter:
  uses-material-design: true
