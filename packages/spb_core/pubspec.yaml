name: spb_core
description: SportBuddies shared core — pure Dart entities, value objects, repository interfaces, and use cases. No Flutter SDK dependency.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  test: ^1.24.0
  build_runner: ^2.7.1
  freezed: ^3.2.3
  json_serializable: ^6.9.4
